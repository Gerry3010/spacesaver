server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # The bundle/HTML/CSS share stable URLs across deploys, so they must always
    # revalidate — otherwise a hard 24h cache on dist/bundle.js hides new
    # deploys until it expires. "no-cache" still stores + serves 304s via ETag,
    # so it's cheap; it just guarantees freshness. Icons are the only truly
    # static assets, so they keep a long cache.
    add_header Cache-Control "no-cache" always;

    location /icons/ {
        add_header Cache-Control "public, max-age=604800";
    }

    # nginx:alpine's mime.types has no .webmanifest entry — set it here
    # (a location default_type, so the inherited mime map stays intact)
    location = /site.webmanifest {
        default_type application/manifest+json;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
