<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>spacesaver</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="idle">
  <canvas id="scene"></canvas>
  <div id="hud">
    <div id="score-panel">
      <div id="score">0</div>
      <div id="combo"></div>
    </div>
    <div id="lives"></div>
    <div id="gameover">
      <h1>GAME OVER</h1>
      <div id="final-score"></div>
      <div id="best-score"></div>
      <div class="restart-hint">move to fly again</div>
    </div>
    <div id="hint">move the mouse to take the stick &mdash; catch <span class="gold">coins</span>, dodge <span class="gray">asteroids</span></div>
    <div id="menu">
      <div id="menu-panel">
        <h1>Pause</h1>
        <div class="menu-buttons">
          <button id="menu-resume">Weiter</button>
          <button id="menu-restart">Neustart</button>
          <button id="menu-fullscreen">Vollbild</button>
        </div>
        <h2>Modus</h2>
        <div class="menu-buttons" id="menu-modes"></div>
        <div class="menu-buttons" style="margin-top: 10px">
          <button id="menu-demo">Demo ansehen</button>
        </div>
        <div class="menu-hint">ESC schlie&szlig;t das Men&uuml;</div>
      </div>
    </div>
    <div id="watermark">spacesaver</div>
    <div id="debug"></div>
  </div>
  <button id="fs-btn" title="Fullscreen (F)">&#x26F6;</button>
  <script src="./dist/bundle.js"></script>
</body>
</html>
