name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:standalone
      - uses: actions/upload-artifact@v4
        with:
          name: spacesaver-standalone
          path: dist/spacesaver.html
      - name: Notify pipepush (failures only)
        if: failure()
        run: |
          curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$PIPEPUSH_TOKEN\",\"status\":\"${{ job.status }}\",\"pipeline\":\"${{ github.workflow }} test\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"runId\":\"${{ github.run_number }}\"}"
        env:
          PIPEPUSH_TOKEN: ${{ secrets.PIPEPUSH_TOKEN }}
          PIPEPUSH_SERVER: ${{ vars.PIPEPUSH_SERVER }}

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency: deploy
    steps:
      - name: Deploy via SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new gerry@82.165.95.152 \
            'cd /opt/spacesaver && git pull --ff-only && docker compose -f deploy/docker-compose.yml up -d --build && docker image prune -f'
      - name: Notify pipepush
        if: always()
        run: |
          curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$PIPEPUSH_TOKEN\",\"status\":\"${{ job.status }}\",\"pipeline\":\"${{ github.workflow }} deploy\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"runId\":\"${{ github.run_number }}\"}"
        env:
          PIPEPUSH_TOKEN: ${{ secrets.PIPEPUSH_TOKEN }}
          PIPEPUSH_SERVER: ${{ vars.PIPEPUSH_SERVER }}
